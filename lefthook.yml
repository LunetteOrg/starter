pre-commit:
  commands:
    biome:
      # Match any staged JS/TS/JSON; biome.json's `files.includes` scopes the
      # actual checking to packages/create/{bin,test} and excludes the bundled
      # templates (which carry their own tooling and must stay verbatim). A single
      # brace group is used on purpose — lefthook doesn't match nested `{…}/{…}`.
      glob: "**/*.{ts,tsx,js,mjs,cjs,json}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      run: pnpm typecheck

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
    # Keep commits clean (matches the template convention).
    strip-coauthor:
      run: grep -ivE '^(Co-authored-by:|🤖 Generated with)' {1} > {1}.tmp && mv {1}.tmp {1}
