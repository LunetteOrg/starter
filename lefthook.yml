pre-commit:
  commands:
    biome:
      # Only the CLI sources — never the bundled templates (they carry their own
      # tooling and must stay verbatim).
      glob: "packages/create/{bin,test}/**/*.{js,mjs,ts,json}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      run: pnpm typecheck

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
    # Keep commits clean (matches the template convention).
    strip-coauthor:
      run: grep -ivE '^(Co-authored-by:|🤖 Generated with)' {1} > {1}.tmp && mv {1}.tmp {1}
