# Render Blueprint — auto-deploy via push su main, nessun workflow GitHub Actions richiesto.
# Docs: https://render.com/docs/blueprint-spec
#
# Personalizzare prima del primo deploy:
#   - `web.name` e `databases[].name`
#   - `web.rootDir`/`buildCommand`/`startCommand` se l'app target non è la prima sotto apps/
#   - aggiungere secrets via dashboard Render (envVars con `sync: false`)

databases:
  - name: starter-db
    databaseName: starter
    user: starter
    plan: free
    region: frankfurt

services:
  - type: web
    name: starter-web
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm turbo run build
    startCommand: pnpm turbo run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: '24'
      - key: DATABASE_URL
        fromDatabase:
          name: starter-db
          property: connectionString
      # TODO: aggiungere qui i secret applicativi (sync: false placeholder)
      # - key: SESSION_SECRET
      #   sync: false
