name: CI

on:
  # Solo, trunk-based: work lands directly on main, so CI must run on push too —
  # not only on PRs — or it never runs.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      # scaffolds each template into a temp dir and asserts the result;
      # SCAFFOLD_SMOKE additionally installs + lints + typechecks a generated
      # project, so template-tooling breakage fails here, not post-push.
      - run: pnpm test
        env:
          SCAFFOLD_SMOKE: '1'
