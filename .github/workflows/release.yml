name: Release @lntt/create

# Triggered by publishing a GitHub Release (which is always backed by a tag).
#   gh release create v0.2.0 --generate-notes
# The release tag (vX.Y.Z) must match packages/create/package.json.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Gate: never publish a broken commit. `pnpm test` includes pack.test.ts,
      # which packs the tarball and scaffolds from it — the same packing check that
      # runs on every PR in ci.yml, so a broken package never reaches this step.
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      - name: Release tag must match the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/create/package.json').version")"
          [ "$TAG" = "$PKG" ] || { echo "release tag '$TAG' != package version '$PKG'"; exit 1; }

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/create
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
