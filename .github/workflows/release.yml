name: Release @lntt/create

# Triggered by publishing a GitHub Release (which is always backed by a tag).
#   gh release create vX.Y.Z --generate-notes
# The release tag (vX.Y.Z) must match packages/create/package.json.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance (no NPM token)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      # Trusted publishing (OIDC) needs npm >= 11.5.1.
      - run: npm install -g npm@^11.5.1
      - run: pnpm install --frozen-lockfile

      # Gate: never publish a broken commit. `pnpm test` includes pack.test.ts,
      # which packs the tarball and scaffolds from it — the same packing check that
      # runs on every PR in ci.yml, so a broken package never reaches this step.
      # SCAFFOLD_SMOKE also installs + lints + typechecks a generated project.
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
        env:
          SCAFFOLD_SMOKE: '1'

      - name: Release tag must match the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/create/package.json').version")"
          [ "$TAG" = "$PKG" ] || { echo "release tag '$TAG' != package version '$PKG'"; exit 1; }

      # Auth is OIDC via the trusted publisher configured on npmjs.com for this
      # repo + workflow — no NPM_TOKEN secret. `prepack` compiles bin/ → dist/
      # (ADR-0005); --provenance is automatic under trusted publishing.
      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/create
