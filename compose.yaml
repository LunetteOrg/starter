services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: starter
      POSTGRES_PASSWORD: starter
      POSTGRES_DB: starter
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    stop_grace_period: 30s
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'starter']
      interval: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
